name: Python and Jupyter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify Python and pip
        run: |
          which python
          python --version
          python -m pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy matplotlib folium jupyter nbconvert

      - name: Run Python script(s)
        run: |
          if [ -f generate_map.py ]; then python generate_map.py; fi

      - name: Check Jupyter notebooks
        run: |
          for notebook in *.ipynb; do
            if [ -f "$notebook" ]; then
              jupyter nbconvert --to notebook --execute "$notebook" --output /dev/null
            fi
          done
